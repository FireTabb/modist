<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <link rel="icon" href="/images/Logotype.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <!-- <link href="https://iconsax.gitlab.io/i/icons.css" rel="stylesheet" /> -->
    <title>modist</title>
  </head>
  <body>
    <!-- toast container -->
    <div
      id="toast-container"
      aria-live="polite"
      aria-atomic="true"
      class="toast-wrapper"
    ></div>
    
    <div class="fixed inset-0 flex">
      <!-- sing in with username and password form -->
      <div
        id="username-password__wraper"
        class="signin_wraper transition-primary absolute inset-0"
        style="transform: translateX(0%)"
      >
        <!-- ///// page title ///// -->
        <section class="section-layout">
          <div class="container">
            <div class="page-title">
              <div class="page-title_wraper">
                <h2 class="title-primary">ورود</h2>
              </div>
            </div>
          </div>
        </section>

        <!-- ///// sign in section ///// -->
        <div class="relative">
          <section class="section-layout">
            <div class="container">
              <!-- ///// form ///// -->
              <form action="" id="signup-sendcode__form" class="w-full">
                <div
                  class="logo-text flex flex-col items-center justify-center gap-8"
                >
                  <!-- ///// logo ///// -->
                  <img src="public/images/Logo.png" alt="" />
                  <!-- ///// username input ///// -->
                  <div class="w-full">
                    <div class="relative w-full">
                      <input
                        type="text"
                        id="username__input"
                        class="peer p-1-regular! focus:border-primary! block w-full rounded-md border border-neutral-400 p-4 text-neutral-800 outline-none"
                        placeholder=" "
                      />
                      <label
                        for="username__input"
                        class="peer-focus:text-primary absolute top-1/2 right-3 -translate-y-1/2 bg-white px-1 text-neutral-400 transition-all duration-200 peer-focus:top-0 peer-focus:text-xs peer-[:not(:placeholder-shown)]:top-0 peer-[:not(:placeholder-shown)]:text-xs"
                      >
                        نام کاربری
                      </label>
                    </div>
                    <div id="username-error" class="hidden text-red-500">
                      نام کاربری خالی است
                    </div>
                  </div>
                  <!-- ///// password input ///// -->
                  <div class="-mt-4 w-full">
                    <div class="relative w-full">
                      <input
                        type="password"
                        id="password__input"
                        class="peer p-1-regular! focus:border-primary! block w-full rounded-md border border-neutral-400 p-4 text-neutral-800 outline-none"
                        placeholder=" "
                      />
                      <label
                        for="password__input"
                        class="peer-focus:text-primary absolute top-1/2 right-3 -translate-y-1/2 bg-white px-1 text-neutral-400 transition-all duration-200 peer-focus:top-0 peer-focus:text-xs peer-[:not(:placeholder-shown)]:top-0 peer-[:not(:placeholder-shown)]:text-xs"
                      >
                        رمز عبور
                      </label>
                    </div>
                    <div id="password-error" class="hidden text-red-500">
                      رمز عبور خالی است
                    </div>
                  </div>
                  <!-- ///// show password ///// -->
                  <div class="w-full">
                    <label
                      for="show-password"
                      class="p-2-bold flex w-fit items-center gap-2 text-neutral-800"
                    >
                      <input
                        type="checkbox"
                        name="showPassword"
                        id="show-password"
                        class="h-3/5 w-5"
                      />
                      نمایش رمز عبور</label
                    >
                  </div>

                  <!-- ///// sign in to account (form submit) ///// -->
                  <button
                    disabled
                    id="signin__apply-btn"
                    type="submit"
                    class="form__apply-btn main-btn p-2-bold bg-primary mt-10 flex justify-center gap-2 px-4 text-white disabled:bg-neutral-800/12 disabled:text-neutral-400 disabled:*:text-neutral-400"
                  >
                    ورود
                  </button>

                  <!-- ///// login ///// -->
                  <div class="flex items-center gap-3">
                    <p class="p-3-bold">رمز رو فراموش کردی؟</p>
                    <a
                      href="profile-signup.html"
                      class="p-2-bold text-secondary"
                      >ورود با رمز یکبار مصرف</a
                    >
                  </div>
                </div>
              </form>
            </div>
          </section>
        </div>
      </div>

      <!-- success page -->
      <div
        id="success-page__wraper"
        class="signin_wraper transition-primary absolute inset-0 gap-8"
        style="transform: translateX(-100%)"
      >
        <!-- ///// success ///// -->
        <div class="relative h-full">
          <section class="section-layout">
            <div class="container">
              <div
                class="logo-text mt-25 flex flex-col items-center justify-center"
              >
                <div></div>
                <!-- ///// logo ///// -->
                <img src="public/images/Logo.png" alt="" />

                <!-- ///// user ///// -->
                <p class="p-1-bold mt-15 text-neutral-900">username عزیز</p>

                <!-- ///// message ///// -->
                <p class="t-5-bold text-success">ورود با موفقیت انجام شد</p>

                <!-- ///// continue ///// -->

                <a
                  href="personal-info.html"
                  class="form__apply-btn main-btn p-2-bold bg-primary absolute right-4 bottom-50 left-4 flex w-auto! justify-center gap-2 px-4 text-white"
                >
                  ادامه
                  <i
                    class="iconsax t-2-bold text-white"
                    icon-name="arrow-left"
                  ></i>
                </a>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
    <!-- footer section -->
    <footer class="footer">
      <!-- menu -->
      <div class="container h-full">
        <div class="flex h-full items-center justify-between">
          <!-- menu btn -->
          <a href="index.html" class="menu-btn">
            <div>
              <i class="iconsax" icon-name="home-2"></i>
            </div>
            خانه
          </a>
          <!-- menu btn -->
          <a href="categories.html" class="menu-btn">
            <div>
              <i class="iconsax" icon-name="search-status-1"></i>
            </div>
            دسته بندی
          </a>
          <!-- menu btn -->
          <a href="shopping-cart.html" class="menu-btn">
            <div>
              <i class="iconsax" icon-name="shopping-cart"></i>
            </div>
            سبد خرید
          </a>
          <!-- menu btn -->
          <a href="profile-signup.html" class="menu-btn active">
            <div>
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M12.1207 12.78C12.0507 12.77 11.9607 12.77 11.8807 12.78C10.1207 12.72 8.7207 11.28 8.7207 9.50998C8.7207 7.69998 10.1807 6.22998 12.0007 6.22998C13.8107 6.22998 15.2807 7.69998 15.2807 9.50998C15.2707 11.28 13.8807 12.72 12.1207 12.78Z"
                  stroke="#9399A6"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M18.7398 19.3801C16.9598 21.0101 14.5998 22.0001 11.9998 22.0001C9.39977 22.0001 7.03977 21.0101 5.25977 19.3801C5.35977 18.4401 5.95977 17.5201 7.02977 16.8001C9.76977 14.9801 14.2498 14.9801 16.9698 16.8001C18.0398 17.5201 18.6398 18.4401 18.7398 19.3801Z"
                  stroke="#9399A6"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                  stroke="#B6BAC3"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            مدیست من
          </a>
        </div>
      </div>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
